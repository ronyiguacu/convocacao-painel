name: Publicar versao

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - plataforma: windows-latest
            args: ""
          - plataforma: macos-latest
            args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.plataforma }}
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.plataforma == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Instalar dependencias do projeto
        run: npm install

      - name: Gerar os icones
        run: npx tauri icon src-tauri/icons/icone.png

      - name: Compilar e publicar a release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Convocacao Painel ${{ github.ref_name }}"
          releaseBody: "Painel de convocacao - Windows e Mac. Atualizacao automatica."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
